<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#17141C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="100 × 100" />
<title>100 × 100</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#17141C;--bg2:#201C29;--bg3:#2B2636;--line:#38313F;
  --text:#F3EFEA;--muted:#9C93A6;--green:#41D88F;--greenDim:rgba(65,216,143,.14);
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
#app{display:flex;justify-content:center}
.pu-shell{width:100%;max-width:440px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;padding-bottom:84px}
.pu-mono{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums}
.pu-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600}
.pu-head{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 8px}
.pu-title{font-weight:700;font-size:19px;letter-spacing:-.01em}
.pu-title b{color:var(--green)}
.pu-daychip{font-size:12px;color:var(--muted);font-weight:600}
.pu-switch{background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.pu-switch:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.pu-idwrap{padding:28px 18px;display:flex;flex-direction:column;gap:16px;flex:1;justify-content:center}
.pu-idq{font-size:26px;font-weight:700;letter-spacing:-.02em;text-align:center}
.pu-idsub{text-align:center;color:var(--muted);font-size:14px;margin-top:-6px}
.pu-idbtn{border:none;border-radius:18px;padding:22px;font-family:inherit;font-size:22px;font-weight:700;color:#13110D;cursor:pointer;letter-spacing:-.01em;transition:transform .12s ease}
.pu-idbtn:active{transform:scale(.97)}
.pu-idbtn:focus-visible{outline:3px solid var(--text);outline-offset:3px}
.pu-board{margin:6px 18px 0;background:var(--bg2);border:1px solid var(--line);border-radius:22px;padding:22px;text-align:center;position:relative;overflow:hidden}
.pu-board .who{font-size:13px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:8px}
.pu-dot{width:9px;height:9px;border-radius:50%}
.pu-count{font-size:64px;line-height:1;font-weight:700;margin:8px 0 2px;letter-spacing:-.02em}
.pu-count .of{font-size:24px;color:var(--muted)}
.pu-bar{height:10px;border-radius:999px;background:var(--bg3);overflow:hidden;margin:16px 2px 0}
.pu-bar i{display:block;height:100%;border-radius:999px;transition:width .45s cubic-bezier(.2,.8,.2,1)}
.pu-done{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--green);font-weight:700;font-size:14px;margin-top:14px}
.pu-done svg{width:18px;height:18px}
.pu-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 18px 0}
.pu-qbtn{background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:16px 0;font-family:'Space Mono',monospace;font-weight:700;font-size:17px;cursor:pointer;transition:transform .1s}
.pu-qbtn:active{transform:scale(.94)}
.pu-qbtn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.pu-row{display:flex;gap:8px;margin:8px 18px 0}
.pu-input{flex:1;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:14px 16px;font-family:'Space Mono',monospace;font-size:16px;font-weight:700;min-width:0}
.pu-input:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.pu-addbtn{border:none;border-radius:14px;padding:0 22px;font-family:inherit;font-weight:700;font-size:15px;color:#13110D;cursor:pointer}
.pu-addbtn:active{transform:scale(.96)}
.pu-mini{display:flex;gap:18px;justify-content:center;margin:14px 18px 0}
.pu-link{background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.pu-link:disabled{opacity:.35;cursor:default;text-decoration:none}
.pu-link:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}
.pu-partner{margin:18px 18px 0;background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
.pu-partner .pl{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
.pu-partner .pr{text-align:right}
.pu-partner .big{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;line-height:1}
.pu-partner .sm{font-size:11px;color:var(--muted);margin-top:3px}
.pu-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 18px 0}
.pu-stat{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px 8px;text-align:center}
.pu-stat .n{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;line-height:1}
.pu-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px;font-weight:600}
.pu-seg{display:flex;background:var(--bg3);border:1px solid var(--line);border-radius:999px;padding:4px;margin:16px 18px 0;gap:4px}
.pu-seg button{flex:1;border:none;background:none;color:var(--muted);font-family:inherit;font-weight:600;font-size:13px;padding:9px 0;border-radius:999px;cursor:pointer}
.pu-seg button[data-on="1"]{background:var(--bg);color:var(--text)}
.pu-seg button:focus-visible{outline:2px solid var(--green);outline-offset:1px}
.pu-calhead{display:flex;align-items:center;justify-content:space-between;margin:18px 18px 10px}
.pu-calhead .m{font-size:17px;font-weight:700;letter-spacing:-.01em}
.pu-nav{background:var(--bg3);border:1px solid var(--line);color:var(--text);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center}
.pu-nav:disabled{opacity:.3;cursor:default}
.pu-nav:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.pu-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:0 18px}
.pu-dow{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding-bottom:2px}
.pu-cell{aspect-ratio:1;border-radius:11px;background:var(--bg2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;font-size:13px;font-weight:600}
.pu-cell.empty{background:none;border:none}
.pu-cell.out{opacity:.28}
.pu-cell.future{color:var(--muted)}
.pu-cell.complete{background:var(--green);border-color:var(--green);color:#0E2417}
.pu-cell.partial{border-color:var(--muted)}
.pu-cell.today{box-shadow:0 0 0 2px var(--text)}
.pu-cell .pct{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;opacity:.8}
.pu-cell .dots{display:flex;gap:4px;margin-top:4px}
.pu-cell .dt{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--line)}
.pu-legend{display:flex;gap:16px;justify-content:center;margin:16px 18px 0;flex-wrap:wrap}
.pu-legend span{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600}
.pu-swatch{width:13px;height:13px;border-radius:4px}
.pu-hundred{margin:6px 18px 0}
.pu-hgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
.pu-hcell{aspect-ratio:1;border-radius:4px;background:var(--bg2);border:1px solid var(--line)}
.pu-hcell.c{background:var(--green);border-color:var(--green)}
.pu-hcell.p{border-color:var(--muted)}
.pu-hcell.t{box-shadow:0 0 0 1.5px var(--text)}
.pu-months{margin:8px 18px 0;display:flex;flex-direction:column;gap:18px}
.pu-monthcard{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px}
.pu-monthcard .mh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.pu-monthcard .mh b{font-size:14px;font-weight:700}
.pu-monthcard .mh em{font-style:normal;font-family:'Space Mono',monospace;font-size:12px;color:var(--green);font-weight:700}
.pu-mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.pu-mcell{aspect-ratio:1;border-radius:4px;background:var(--bg3);border:1px solid transparent}
.pu-mcell.c{background:var(--green)}
.pu-mcell.p{border-color:var(--muted);background:var(--greenDim)}
.pu-mcell.empty{background:none}
.pu-tabs{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;background:linear-gradient(transparent,var(--bg) 22%);pointer-events:none}
.pu-tabsinner{width:100%;max-width:440px;display:flex;background:var(--bg2);border-top:1px solid var(--line);pointer-events:auto;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.pu-tab{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-weight:600;font-size:11px;padding:8px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.pu-tab[data-on="1"]{color:var(--text)}
.pu-tab svg{width:22px;height:22px}
.pu-tab:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:8px}
.pu-setup{padding:34px 22px;display:flex;flex-direction:column;gap:18px;flex:1;justify-content:center}
.pu-field label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:7px}
.pu-field input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:15px 16px;font-family:inherit;font-size:16px;font-weight:600}
.pu-field input:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.pu-go{border:none;border-radius:16px;padding:18px;font-family:inherit;font-weight:700;font-size:17px;color:#13110D;background:var(--green);cursor:pointer;margin-top:4px}
.pu-go:disabled{opacity:.4;cursor:default}
.pu-go:active{transform:scale(.98)}
.pu-err{color:#FF9A7A;font-size:13px;font-weight:600;text-align:center}
.pu-cele{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:20;background:var(--green);color:#0E2417;font-weight:700;font-size:14px;padding:12px 20px;border-radius:999px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:puPop .3s ease}
.pu-cele svg{width:18px;height:18px}
@keyframes puPop{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
.pu-pulse{animation:puPulse .7s ease}
@keyframes puPulse{0%,100%{transform:scale(1)}40%{transform:scale(1.08)}}
.pu-note{margin:14px 18px 0;font-size:12px;color:var(--muted);text-align:center;line-height:1.5}
.pu-nudge{margin:6px 18px 0;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;display:flex;gap:11px;align-items:center;font-size:13px;font-weight:600;color:var(--text)}
.pu-nudge svg{width:18px;height:18px;color:var(--muted);flex-shrink:0}
@media (prefers-reduced-motion:reduce){.pu-pulse,.pu-cele{animation:none}.pu-bar i{transition:none}}
</style>
</head>
<body>
<div class="pu-root"><div id="app"><div class="pu-shell"><div class="pu-note" style="margin-top:60vh">Loading…</div></div></div></div>

<script type="module">
/* ======================================================================
   100 × 100  —  standalone version for GitHub Pages (Firebase Firestore)
   ----------------------------------------------------------------------
   STEP 1: paste your Firebase web-app config in the object just below.
           (Firebase console -> Project settings -> "Your apps" -> Config)
   That is the ONLY thing you need to edit in this file.
   ====================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyA8DABaW9EuauoitrC39lBU6hbqwtKSEOg",
  authDomain: "pushups-6a445.firebaseapp.com",
  projectId: "pushups-6a445",
  storageBucket: "pushups-6a445.firebasestorage.app",
  messagingSenderId: "1055243207212",
  appId: "1:1055243207212:web:72dda73a6c75e72c12c789"
};
/* ====================================================================== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const GOAL = 100, DAYS = 100, COLORS = ["#FF7A59", "#4FC4E8"];

let db, configRef, logsRef;
let config = null, logs = {}, me = null, loaded = false;
let view = "today", calMonth = startOfMonth(new Date()), calWho = "me", ovWho = "me";
let lastAdd = 0, typing = false, needsRender = false, pulse = false, cele = false;

/* ---- date helpers ---- */
function pad(n){ return String(n).padStart(2,"0"); }
function toKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function parseKey(s){ const a=s.split("-").map(Number); return new Date(a[0],a[1]-1,a[2]); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function dayStart(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function startOfMonth(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function todayKey(){ return toKey(new Date()); }
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW=["S","M","T","W","T","F","S"];
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

const ICON={
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  today:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>',
  grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a1.9 1.9 0 0 1-3.4 0"/></svg>'
};

/* ---- derived ---- */
function names(){ return config ? config.names : []; }
function accentOf(name){ const i=names().indexOf(name); return COLORS[i] || COLORS[0]; }
function partnerName(){ return me ? names().find(n=>n!==me) : null; }
function countOf(name,key){ return (logs[name] && logs[name][key]) || 0; }
function isComplete(name,key){ return countOf(name,key) >= GOAL; }
function challenge(){
  if(!config) return null;
  const s=parseKey(config.start), keys=[];
  for(let i=0;i<DAYS;i++) keys.push(toKey(addDays(s,i)));
  const diff=Math.floor((dayStart(new Date())-s)/86400000)+1;
  return { start:s, keys, dayNum:Math.min(Math.max(diff,1),DAYS) };
}
function statsFor(name){
  const ch=challenge(); if(!ch) return {done:0,total:0,streak:0};
  let done=0,total=0;
  for(const k of ch.keys){ const c=countOf(name,k); total+=c; if(c>=GOAL) done++; }
  let streak=0, cur=dayStart(new Date());
  if(!isComplete(name,toKey(cur))) cur=addDays(cur,-1);
  while(isComplete(name,toKey(cur))){ streak++; cur=addDays(cur,-1); }
  return {done,total,streak};
}

/* ---- firebase wiring ---- */
function start(){
  try{
    const app=initializeApp(firebaseConfig);
    db=getFirestore(app);
    configRef=doc(db,"pushup100","config");
    logsRef=doc(db,"pushup100","logs");
  }catch(e){ fatal("Couldn't start Firebase. Check the config block at the top of index.html."); return; }

  me=localStorage.getItem("pushup_me");

  onSnapshot(configRef, snap=>{
    config = snap.exists() ? snap.data() : null;
    if(config && me && !config.names.includes(me)) me=null;
    loaded=true; scheduleRender();
  }, err=>fatal("Can't read the database. Make sure Firestore is enabled and the rules allow access. ("+err.code+")"));

  onSnapshot(logsRef, snap=>{
    logs = snap.exists() ? snap.data() : {};
    scheduleRender();
  }, ()=>{});
}
function fatal(msg){
  document.getElementById("app").innerHTML =
    '<div class="pu-shell"><div class="pu-note" style="margin-top:40vh;color:#FF9A7A">'+esc(msg)+'</div></div>';
}

async function saveConfig(n1,n2,startDate){
  const cfg={names:[n1,n2],start:startDate,goal:GOAL,days:DAYS};
  await setDoc(configRef,cfg);
  await setDoc(logsRef,{[n1]:{},[n2]:{}},{merge:true});
}
async function writeMine(map){
  logs={...logs,[me]:map};          // optimistic
  await setDoc(logsRef,{[me]:map},{merge:true});
}
async function add(n){
  if(!me||!n) return;
  const k=todayKey(), mine={...(logs[me]||{})};
  const before=mine[k]||0, after=Math.max(0,before+n);
  mine[k]=after;
  if(n>0) lastAdd=n;
  pulse=true; render(); setTimeout(()=>{pulse=false;},700);
  if(before<GOAL && after>=GOAL){ cele=true; setTimeout(()=>{cele=false; render();},2600); }
  await writeMine(mine);
}
async function setExact(n){
  if(!me) return;
  const k=todayKey(), mine={...(logs[me]||{})};
  mine[k]=Math.max(0,n); lastAdd=0;
  await writeMine(mine);
}

/* ---- render scheduling (don't yank the screen while typing) ---- */
function scheduleRender(){ if(typing){ needsRender=true; return; } render(); }

/* ============================ RENDER ============================ */
function render(){
  const app=document.getElementById("app");
  let html;
  if(!loaded){ html='<div class="pu-shell"><div class="pu-note pu-mono" style="margin-top:45vh">Loading…</div></div>'; }
  else if(!config){ html=renderSetup(); }
  else if(!me){ html=renderIdentity(); }
  else { html=renderMain(); }
  app.innerHTML=(cele?celeBanner():"")+html;
}
function celeBanner(){ return '<div class="pu-cele">'+ICON.check+'100 done — nice work, '+esc(me)+'</div>'; }

function renderSetup(){
  return '<div class="pu-shell"><div class="pu-setup">'+
    '<div><div class="pu-eyebrow">Set up your challenge</div>'+
    '<div class="pu-idq" style="text-align:left;margin-top:8px">100 pushups,<br>100 days, together.</div></div>'+
    '<div class="pu-field"><label>First person</label><input id="n1" maxlength="24" placeholder="e.g. Alex"></div>'+
    '<div class="pu-field"><label>Second person</label><input id="n2" maxlength="24" placeholder="e.g. Sam"></div>'+
    '<div class="pu-field"><label>Start date (day 1)</label><input id="sd" type="date" value="'+todayKey()+'"></div>'+
    '<div class="pu-err" id="err" style="display:none"></div>'+
    '<button class="pu-go" data-action="save-setup">Start the 100 days</button>'+
    '<div class="pu-note">This runs once. After this, you each just tap your name to log.</div>'+
    '</div></div>';
}
function renderIdentity(){
  let btns="";
  names().forEach((nm,i)=>{ btns+='<button class="pu-idbtn" style="background:'+COLORS[i]+'" data-action="pick" data-idx="'+i+'">'+esc(nm)+'</button>'; });
  return '<div class="pu-shell"><div class="pu-idwrap">'+
    '<div><div class="pu-idq">Who\u2019s logging?</div><div class="pu-idsub">This phone will remember you.</div></div>'+
    btns+'</div></div>';
}

function renderMain(){
  const ch=challenge();
  let body="";
  if(view==="today") body=renderToday();
  else if(view==="calendar") body=renderCalendar();
  else body=renderOverview();
  return '<div class="pu-shell">'+
    '<div class="pu-head"><div><div class="pu-title">100 <b>\u00d7</b> 100</div>'+
    '<div class="pu-daychip">Day '+ch.dayNum+' of '+DAYS+'</div></div>'+
    '<button class="pu-switch" data-action="not-me">Not '+esc(me)+'?</button></div>'+
    '<div style="padding-top:4px">'+body+'</div>'+
    '<div class="pu-tabs"><div class="pu-tabsinner">'+
    tab("today",ICON.today,"Today")+tab("calendar",ICON.cal,"Calendar")+tab("overview",ICON.grid,"Overview")+
    '</div></div></div>';
}
function tab(v,icon,label){ return '<button class="pu-tab" data-on="'+(view===v?1:0)+'" data-action="set-view" data-view="'+v+'">'+icon+label+'</button>'; }

function renderToday(){
  const k=todayKey(), c=countOf(me,k), pct=Math.min(100,Math.round(c/GOAL*100)), done=c>=GOAL;
  const acc=accentOf(me), ch=challenge(), ms=statsFor(me);
  const p=partnerName();
  let h="";
  if(c===0){
    h+='<div class="pu-nudge" style="border-left:3px solid '+acc+'">'+ICON.bell+'<span>Nothing logged yet today \u2014 your '+GOAL+' is waiting.</span></div>';
  }
  h+='<div class="pu-board"><div class="who"><span class="pu-dot" style="background:'+acc+'"></span>'+esc(me)+' \u00b7 today</div>'+
     '<div class="pu-count pu-mono'+(pulse?" pu-pulse":"")+'" style="color:'+(done?"var(--green)":"var(--text)")+'">'+c+'<span class="of"> / '+GOAL+'</span></div>'+
     '<div class="pu-bar"><i style="width:'+pct+'%;background:'+(done?"var(--green)":acc)+'"></i></div>'+
     (done?'<div class="pu-done">'+ICON.check+'Done for today'+(c>GOAL?' \u00b7 +'+(c-GOAL)+' extra':'')+'</div>':'')+
     '</div>';
  h+='<div class="pu-quick">'+[1,5,10,25].map(n=>'<button class="pu-qbtn" data-action="add" data-n="'+n+'">+'+n+'</button>').join("")+'</div>';
  h+='<div class="pu-row"><input class="pu-input" id="customAmt" type="number" inputmode="numeric" placeholder="custom">'+
     '<button class="pu-addbtn" style="background:'+acc+'" data-action="add-custom">Add</button></div>';
  h+='<div class="pu-mini"><button class="pu-link" data-action="undo"'+(lastAdd?"":" disabled")+'>Undo last (+'+(lastAdd||0)+')</button>'+
     '<button class="pu-link" data-action="edit-total">Edit total</button></div>';
  if(p){
    const pc=countOf(p,k), ps=statsFor(p);
    h+='<div class="pu-partner"><div class="pl"><span class="pu-dot" style="background:'+accentOf(p)+'"></span>'+esc(p)+'</div>'+
       '<div class="pr"><div class="big" style="color:'+(pc>=GOAL?"var(--green)":"var(--text)")+'">'+pc+'<span style="color:var(--muted);font-size:14px"> / '+GOAL+'</span></div>'+
       '<div class="sm">'+(pc>=GOAL?"done today":ps.streak+" day streak")+'</div></div></div>';
  }
  h+='<div class="pu-stats"><div class="pu-stat"><div class="n">'+ms.done+'</div><div class="l">Days done</div></div>'+
     '<div class="pu-stat"><div class="n">'+ms.streak+'</div><div class="l">Streak</div></div>'+
     '<div class="pu-stat"><div class="n">'+ms.total.toLocaleString()+'</div><div class="l">Total reps</div></div></div>';
  h+='<div class="pu-note">Day '+ch.dayNum+' of '+DAYS+' \u00b7 '+(DAYS-ms.done)+' days left to complete</div>';
  return h;
}

function seg(opts){ // opts: [{val,label,on}]
  return '<div class="pu-seg">'+opts.map(o=>'<button data-on="'+(o.on?1:0)+'" data-action="'+o.act+'" data-val="'+o.val+'">'+esc(o.label)+'</button>').join("")+'</div>';
}

function renderCalendar(){
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  const lead=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  const cs=parseKey(config.start), ce=addDays(cs,DAYS-1), p=partnerName();
  let cells="";
  for(let i=0;i<lead;i++) cells+='<div class="pu-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d), key=toKey(date);
    const inRange=date>=dayStart(cs)&&date<=dayStart(ce);
    const isToday=key===todayKey(), isFuture=date>dayStart(new Date());
    let cls="pu-cell", inner="";
    if(!inRange) cls+=" out";
    if(isToday) cls+=" today";
    if(calWho==="both"){
      inner='<div class="dots">'+names().map(nm=>{
        const on=isComplete(nm,key);
        return '<span class="dt" style="'+(on?"background:var(--green);border-color:var(--green)":"")+'"></span>';
      }).join("")+'</div>';
    }else{
      const who=calWho==="me"?me:p, cc=countOf(who,key);
      if(cc>=GOAL) cls+=" complete";
      else if(cc>0){ cls+=" partial"; inner='<span class="pct">'+Math.round(cc/GOAL*100)+'%</span>'; }
      else if(isFuture&&inRange) cls+=" future";
    }
    cells+='<div class="'+cls+'"><span>'+d+'</span>'+inner+'</div>';
  }
  const prevOk=new Date(y,m,1)>new Date(cs.getFullYear(),cs.getMonth(),1);
  const nextOk=new Date(y,m,1)<new Date(ce.getFullYear(),ce.getMonth(),1);
  const opts=[{val:"me",label:"You",on:calWho==="me",act:"cal-who"}];
  if(p) opts.push({val:"partner",label:p,on:calWho==="partner",act:"cal-who"});
  opts.push({val:"both",label:"Both",on:calWho==="both",act:"cal-who"});
  return seg(opts)+
    '<div class="pu-calhead"><button class="pu-nav" data-action="cal-prev"'+(prevOk?"":" disabled")+' aria-label="Previous month">\u2039</button>'+
    '<div class="m">'+MONTHS[m]+' '+y+'</div>'+
    '<button class="pu-nav" data-action="cal-next"'+(nextOk?"":" disabled")+' aria-label="Next month">\u203a</button></div>'+
    '<div class="pu-grid">'+DOW.map(x=>'<div class="pu-dow">'+x+'</div>').join("")+'</div>'+
    '<div class="pu-grid" style="margin-top:6px">'+cells+'</div>'+
    '<div class="pu-legend"><span><span class="pu-swatch" style="background:var(--green)"></span>Completed</span>'+
    '<span><span class="pu-swatch" style="background:var(--bg2);border:1px solid var(--muted)"></span>Partial</span>'+
    '<span><span class="pu-swatch" style="background:var(--bg2);box-shadow:0 0 0 2px var(--text)"></span>Today</span></div>';
}

function renderOverview(){
  const p=partnerName(), who=ovWho==="me"?me:p, st=statsFor(who), ch=challenge();
  const opts=[{val:"me",label:"You",on:ovWho==="me",act:"ov-who"}];
  if(p) opts.push({val:"partner",label:p,on:ovWho==="partner",act:"ov-who"});
  let h=seg(opts);
  h+='<div class="pu-stats"><div class="pu-stat"><div class="n">'+st.done+'<span style="color:var(--muted);font-size:13px">/'+DAYS+'</span></div><div class="l">Completed</div></div>'+
     '<div class="pu-stat"><div class="n">'+st.streak+'</div><div class="l">Streak</div></div>'+
     '<div class="pu-stat"><div class="n">'+(st.total/1000).toFixed(1)+'k</div><div class="l">Total reps</div></div></div>';
  let hg="";
  for(const k of ch.keys){ const c=countOf(who,k); let cl="pu-hcell"; if(c>=GOAL) cl+=" c"; else if(c>0) cl+=" p"; if(k===todayKey()) cl+=" t"; hg+='<div class="'+cl+'" title="'+k+': '+c+'/'+GOAL+'"></div>'; }
  h+='<div class="pu-hundred"><div class="pu-eyebrow" style="margin:20px 0 10px">The 100 \u2014 '+esc(who)+'</div><div class="pu-hgrid">'+hg+'</div></div>';
  // month by month
  const seen={}, mlist=[];
  for(const k of ch.keys){ const d=parseKey(k), tag=d.getFullYear()+"-"+d.getMonth(); if(!seen[tag]){ seen[tag]=1; mlist.push({y:d.getFullYear(),m:d.getMonth()}); } }
  const keySet={}; ch.keys.forEach(k=>keySet[k]=1);
  let months="";
  for(const mm of mlist){
    const dim=new Date(mm.y,mm.m+1,0).getDate(), lead=new Date(mm.y,mm.m,1).getDay();
    let done=0, cells="";
    for(let i=0;i<lead;i++) cells+='<div class="pu-mcell empty"></div>';
    for(let d=1;d<=dim;d++){
      const key=toKey(new Date(mm.y,mm.m,d)), inRange=keySet[key], c=countOf(who,key);
      let cl="pu-mcell"; if(!inRange) cl+=" empty"; else if(c>=GOAL){ cl+=" c"; done++; } else if(c>0) cl+=" p";
      cells+='<div class="'+cl+'"></div>';
    }
    months+='<div class="pu-monthcard"><div class="mh"><b>'+MONTHS[mm.m]+' '+mm.y+'</b><em>'+done+' done</em></div><div class="pu-mgrid">'+cells+'</div></div>';
  }
  h+='<div class="pu-eyebrow" style="margin:22px 18px 4px">Month by month</div><div class="pu-months">'+months+'</div>';
  return h;
}

/* ============================ EVENTS ============================ */
const app=document.getElementById("app");
app.addEventListener("focusin", e=>{ if(e.target.tagName==="INPUT") typing=true; });
app.addEventListener("focusout", e=>{ if(e.target.tagName==="INPUT"){ typing=false; if(needsRender){ needsRender=false; setTimeout(render,0); } } });
app.addEventListener("keydown", e=>{ if(e.target.id==="customAmt" && e.key==="Enter") addCustom(); });
app.addEventListener("click", e=>{
  const el=e.target.closest("[data-action]"); if(!el) return;
  const a=el.dataset.action;
  if(a==="add") add(parseInt(el.dataset.n,10));
  else if(a==="add-custom") addCustom();
  else if(a==="undo"){ if(lastAdd){ const v=lastAdd; lastAdd=0; add(-v); } }
  else if(a==="edit-total"){ const cur=countOf(me,todayKey()); const v=prompt("Set today\u2019s exact total for "+me+":",String(cur)); if(v!==null){ const n=parseInt(v,10); if(!isNaN(n)) setExact(n); } }
  else if(a==="pick"){ me=names()[parseInt(el.dataset.idx,10)]; localStorage.setItem("pushup_me",me); render(); }
  else if(a==="not-me"){ me=null; localStorage.removeItem("pushup_me"); render(); }
  else if(a==="set-view"){ view=el.dataset.view; render(); }
  else if(a==="cal-who"){ calWho=el.dataset.val; render(); }
  else if(a==="ov-who"){ ovWho=el.dataset.val; render(); }
  else if(a==="cal-prev"){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1); render(); }
  else if(a==="cal-next"){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1); render(); }
  else if(a==="save-setup") doSave();
});
function addCustom(){ const inp=document.getElementById("customAmt"); if(!inp) return; const n=parseInt(inp.value,10); inp.value=""; typing=false; if(!isNaN(n)) add(n); }
function doSave(){
  const n1=(document.getElementById("n1").value||"").trim();
  const n2=(document.getElementById("n2").value||"").trim();
  const sd=document.getElementById("sd").value;
  const err=document.getElementById("err");
  if(!n1||!n2||n1.toLowerCase()===n2.toLowerCase()||!sd){ err.textContent="Enter two different names and a start date."; err.style.display="block"; return; }
  saveConfig(n1,n2,sd);
}

window.addEventListener("focus", ()=>{ if(!typing) render(); });
start();
</script>
